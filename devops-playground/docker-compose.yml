version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# DevOps Playground – full local stack
#
# Usage:
#   docker compose up --build          # start all
#   docker compose up --scale app=3   # simulate 3 pods
#   docker compose down -v             # teardown
# ─────────────────────────────────────────────────────────────────────────────

networks:
  devops-net:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:


services:

  # ── Main App ──────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: devops-playground:latest
    container_name: devops-playground-app
    ports:
      - "5000:5000"
    environment:
      POD_NAME:    "${HOSTNAME:-devops-pod-local}"
      NAMESPACE:   "local"
      NODE_NAME:   "docker-desktop"
      APP_VERSION: "1.0.0"
    networks:
      - devops-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "prometheus.scrape=true"
      - "prometheus.port=5000"
      - "prometheus.path=/metrics"

  # ── Nginx Load Balancer (simulate multiple pods) ───────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: devops-lb
    ports:
      - "80:80"
    volumes:
      - ./monitoring/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - devops-net
    restart: unless-stopped

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: devops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    networks:
      - devops-net
    restart: unless-stopped

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: devops-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER:     admin
      GF_SECURITY_ADMIN_PASSWORD: devops123
      GF_USERS_ALLOW_SIGN_UP:     "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-datasource.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
      - ./monitoring/grafana-dashboard.json:/var/lib/grafana/dashboards/devops-playground.json:ro
      - ./monitoring/grafana-dashboard-provider.yml:/etc/grafana/provisioning/dashboards/provider.yml:ro
    depends_on:
      - prometheus
    networks:
      - devops-net
    restart: unless-stopped
