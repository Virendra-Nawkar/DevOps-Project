# ─────────────────────────────────────────────────────────────────────────────
# DevOps Playground – full local stack
#
# Ports (office firewall compatible):
#   80  → App dashboard
#   81  → Nginx load balancer
#   82  → Prometheus
#   83  → Grafana          (admin / devops123)
#   84  → Alertmanager
#
# Usage:
#   docker compose up --build          # start all
#   docker compose up --scale app=3   # simulate 3 pods
#   docker compose down -v             # teardown
# ─────────────────────────────────────────────────────────────────────────────

networks:
  devops-net:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  loki_data:


services:

  # ── Main App ──────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: devops-playground:latest
    container_name: devops-playground-app
    ports:
      - "80:80"
    environment:
      POD_NAME:    "${HOSTNAME:-devops-pod-local}"
      NAMESPACE:   "local"
      NODE_NAME:   "docker-desktop"
      APP_VERSION: "1.0.0"
    networks:
      - devops-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:80/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "prometheus.scrape=true"
      - "prometheus.port=80"
      - "prometheus.path=/metrics"

  # ── Nginx Load Balancer ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: devops-lb
    ports:
      - "81:80"
    volumes:
      - ./monitoring/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - devops-net
    restart: unless-stopped

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: devops-prometheus
    ports:
      - "82:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    networks:
      - devops-net
    restart: unless-stopped

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: devops-grafana
    ports:
      - "83:3000"
    environment:
      GF_SECURITY_ADMIN_USER:     admin
      GF_SECURITY_ADMIN_PASSWORD: devops123
      GF_USERS_ALLOW_SIGN_UP:     "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-datasource.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
      - ./monitoring/grafana-dashboard.json:/var/lib/grafana/dashboards/devops-playground.json:ro
      - ./monitoring/grafana-dashboard-provider.yml:/etc/grafana/provisioning/dashboards/provider.yml:ro
    depends_on:
      - prometheus
      - loki
    networks:
      - devops-net
    restart: unless-stopped

  # ── Blue App (v1.0.0) – internal only, accessed via router ──────────────
  app-blue:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: devops-playground:latest
    container_name: devops-app-blue
    environment:
      POD_NAME:    "blue-pod"
      NAMESPACE:   "local"
      NODE_NAME:   "docker-desktop"
      APP_VERSION: "1.0.0"
      APP_COLOR:   "blue"
    networks:
      - devops-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:80/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Green App (v2.0.0) – internal only, accessed via router ──────────────
  app-green:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: devops-playground:latest
    container_name: devops-app-green
    environment:
      POD_NAME:    "green-pod"
      NAMESPACE:   "local"
      NODE_NAME:   "docker-desktop"
      APP_VERSION: "2.0.0"
      APP_COLOR:   "green"
    networks:
      - devops-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:80/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Blue/Green Router – traffic splitter on port 85 ───────────────────────
  router:
    build:
      context: .
      dockerfile: Dockerfile.router
    container_name: devops-router
    ports:
      - "85:85"
    environment:
      BLUE_URL:  http://app-blue:80
      GREEN_URL: http://app-green:80
    depends_on:
      - app-blue
      - app-green
    networks:
      - devops-net
    restart: unless-stopped

  # ── Alertmanager ──────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: devops-alertmanager
    ports:
      - "84:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--log.level=warn"
    networks:
      - devops-net
    restart: unless-stopped

  # ── Loki (log aggregation) ────────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.7
    container_name: devops-loki
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/loki-config.yml
    networks:
      - devops-net
    restart: unless-stopped

  # ── Promtail (log collector → sends to Loki) ──────────────────────────────
  promtail:
    image: grafana/promtail:2.9.7
    container_name: devops-promtail
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/promtail-config.yml
    depends_on:
      - loki
    networks:
      - devops-net
    restart: unless-stopped
    user: root        # needed to read Docker socket
