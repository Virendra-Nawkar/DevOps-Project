# ─────────────────────────────────────────────────────────────────────────────
# CI/CD Pipeline – DevOps Playground
#
# What this does:
#   1. On every push to main → builds Docker image
#   2. Pushes image to GitHub Container Registry (GHCR) – free & built-in
#   3. SSHs into your VM and deploys the latest version automatically
#
# GitHub Secrets you must add (Settings → Secrets → Actions):
#   VM_HOST      → 52.173.127.47
#   VM_USER      → your SSH username (e.g. vir or azureuser)
#   VM_SSH_KEY   → your private SSH key (cat ~/.ssh/id_rsa)
# ─────────────────────────────────────────────────────────────────────────────
name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: devops-playground

jobs:
  # ── Job 1: Build & push Docker image ───────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # needed to push to GHCR

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image info
        run: |
          echo "Image pushed: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest"
          echo "Commit SHA tag: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}"

  # ── Job 2: Deploy to VM (only on push to main, not on PRs) ─────────────────
  deploy:
    name: Deploy to VM
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            echo "── Pulling latest code ──"
            cd ~/DevOps-Project/devops-playground
            git pull origin main

            echo "── Restarting containers ──"
            docker compose down
            docker compose up --build -d

            echo "── Health check ──"
            sleep 10
            curl -sf http://localhost:80/health && echo "App is healthy!" || echo "Health check failed!"

            echo "── Deployment complete ──"
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
