# =============================================================================
# App Green  –  v2.0.0  (new version being rolled out)
# Namespace: devops
# Internal only – accessed via router service
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-green
  namespace: devops
  labels:
    app: app-green
    version: "2.0.0"
    track: green
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-green
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: app-green
        version: "2.0.0"
        track: green
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: app
        image: devops-playground:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: APP_VERSION
          value: "2.0.0"
        - name: APP_COLOR
          value: "green"
        resources:
          requests:
            cpu: "200m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: app-green
  namespace: devops
  labels:
    app: app-green
    track: green
spec:
  selector:
    app: app-green
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: 80
