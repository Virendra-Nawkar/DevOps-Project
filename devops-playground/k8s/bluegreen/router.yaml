# =============================================================================
# Blue/Green Router  –  traffic splitter between blue and green
# Namespace: devops
# Access:  kubectl port-forward svc/router 85:85 -n devops
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: router
  namespace: devops
  labels:
    app: router
spec:
  replicas: 1
  selector:
    matchLabels:
      app: router
  template:
    metadata:
      labels:
        app: router
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: router
        image: devops-router:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 85
        env:
        - name: BLUE_URL
          value: "http://app-blue.devops.svc.cluster.local:80"
        - name: GREEN_URL
          value: "http://app-green.devops.svc.cluster.local:80"
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
        livenessProbe:
          httpGet:
            path: /router/health
            port: 85
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /router/health
            port: 85
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: router
  namespace: devops
  labels:
    app: router
spec:
  selector:
    app: router
  type: ClusterIP
  ports:
  - name: http
    port: 85
    targetPort: 85
